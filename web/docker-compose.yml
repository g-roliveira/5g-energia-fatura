services:
  db:
    image: postgres:17-alpine
    container_name: fatura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fatura_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fatura_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
